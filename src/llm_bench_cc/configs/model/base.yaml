name: base
hf_id: google/gemma-4-E4B-it
dtype: bfloat16          # model's native training dtype; override to float16 only on legacy fp16-only hardware
device_map: auto
trust_remote_code: false
attn_implementation: eager   # safe default; switch to "sdpa" or "flash_attention_2" on Ada+

# Persistent cache so the weights aren't re-downloaded each run.
# Override to a mounted Drive path on Colab, e.g. /content/drive/MyDrive/hf-cache.
cache_dir: null
local_files_only: false  # set true to fail fast instead of hitting the network

generation:
  max_new_tokens: 256
  do_sample: false
  temperature: 1.0

# Quantization config; null = full-precision load. Variant configs
# (e.g. bnb-int8, bnb-nf4) populate this. Schema is backend-specific.
quant: null
