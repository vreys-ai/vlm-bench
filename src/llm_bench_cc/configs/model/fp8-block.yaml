# FP8_BLOCK quantized gemma-4-E4B-it produced offline by scripts/quantize_fp8.py
# (Neural Magic llmcompressor `model_free_ptq`, compressed-tensors save format).
#
# This config does NOT trigger quantization at load time — it points at a
# pre-quantized local checkpoint whose `config.json` carries its own
# compressed-tensors block. transformers + compressed-tensors auto-instantiate
# it on `from_pretrained`.
#
# Override `hf_id` on the CLI to match wherever you saved the checkpoint, e.g.:
#   model=fp8-block model.hf_id=/mnt/ssd/llm-bench-cc/quant/gemma-4-E4B-it-FP8_BLOCK
defaults:
  - base
  - _self_

name: fp8-block
hf_id: /tmp/llm-bench-cc/quant/gemma-4-E4B-it-FP8_BLOCK   # local SSD path; override per-VM as needed
dtype: bfloat16   # compute dtype for unquantized layers (vision + audio towers, embeds, lm_head)

quant:
  backend: compressed_tensors
  mode: fp8_block
  # `targets` / `ignore` / `scheme` live in the saved checkpoint's
  # compressed-tensors config — recorded here for run-summary provenance only.
