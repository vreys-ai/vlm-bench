defaults:
  - model: base
  - eval: smoke
  - _self_

run_name: ${model.name}-${eval.name}-${now:%Y%m%d-%H%M%S}
output_dir: /content/drive/MyDrive/vlm-bench-runs
seed: 42

# Path to a previously written baseline.json. When set and model.name != "base",
# the runner computes the composite retention score against it.
baseline_path: null

wandb:
  project: llm-bench-cc
  entity: null
  mode: online      # online | offline | disabled
  tags: []

carbon:
  enabled: true
  # null = let codecarbon resolve via geo-IP. Backup API is reliable; the
  # primary's transient failures are silenced (see tracking.py log_level note).
  # Set explicitly (e.g. "USA", "FRA") to skip the lookup entirely if needed.
  country_iso_code: null
  measure_power_secs: 5
  # Known precision caveat on Colab: CPU energy is TDP-estimated rather than
  # RAPL-measured (virtualized VM has no /sys/class/powercap/intel-rapl access)
  # and the Xeon @ 2.20 GHz isn't in codecarbon's TDP DB so it falls back to a
  # constant. GPU energy (via pynvml) is unaffected and dominates VLM workloads.
  # All six related WARNING lines are suppressed at tracker init — re-enable by
  # changing tracking.py's log_level to "warning" if running on bare-metal.

# Inference-time runtime knobs. Cheap memory-hygiene levers for tight GPUs.
runtime:
  backend: hf                        # hf | vllm. Selects the inference stack.
  image_max_side: 512                # cap longest image side before processor; null disables
  empty_cache_between_samples: true  # torch.cuda.empty_cache() after each sample (HF backend only — vLLM owns its own cache)
  cleanup_dataset_after_task: false  # rmtree the HF cache for each dataset once its task finishes; opt-in for tight-disk Colab VMs
  # vLLM-specific knobs, consumed only when backend == vllm.
  vllm:
    gpu_memory_utilization: 0.9      # fraction of VRAM vLLM allocates for the KV cache pool. Smaller -> weights dominate peak_vram (but crashes if too small to fit the model).
    limit_mm_per_prompt:             # multimodal slot counts per prompt.
      image: 1
      audio: 0

hydra:
  run:
    dir: ${output_dir}/${run_name}
  job:
    chdir: false
