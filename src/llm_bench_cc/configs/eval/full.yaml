name: full
samples_per_task: 200
seed: 42

# Stage 0 is scoped to a single light task while we validate the pipeline.
# Reinstate caption / docvqa / vqa / chart once OCR runs end-to-end.
tasks:
  - ocr

datasets:
  ocr:
    hf_id: echo840/OCRBench
    split: test

# Per-task generation overrides on top of model.generation. Trims KV-cache memory.
generation_overrides:
  ocr:
    max_new_tokens: 64
